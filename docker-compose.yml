x-runner-base: &runner-base
  build:
    context: .
    args:
      RUNNER_ARCH: arm64
      DOCKER_GID: ${DOCKER_GID}
  env_file:
    - .env
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  restart: unless-stopped
  group_add:
    - "${DOCKER_GID}"

services: {}

# ──────────────────────────────────────────────────────────────
# Service werden in docker-compose.override.yml eintragen
# ──────────────────────────────────────────────────────────────
