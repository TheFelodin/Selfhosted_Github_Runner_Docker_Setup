x-runner-base: &runner-base
  build:
    context: .
    args:
      RUNNER_ARCH: arm64
      DOCKER_GID: ${DOCKER_GID}
  env_file:
    - .env
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  restart: unless-stopped
  group_add:
    - "${DOCKER_GID}"

services: {}

# ──────────────────────────────────────────────────────────────
# Beispiel-Service – in docker-compose.override.yml eintragen
# ──────────────────────────────────────────────────────────────
#
# services:
#   mein-repo:                                    # <- Service-Name (frei wählbar)
#     <<: *runner-base
#     environment:
#       REPO_NAME: mein-repo                      # <- Runner-Name & Label im Workflow
#       REPO_URL: https://github.com/USER/REPO    # <- Repo-URL
#     volumes:
#       - /var/run/docker.sock:/var/run/docker.sock
#       - mein-repo:/github/workspace             # <- Workspace-Volume (gleicher Name)
#
#       # Optional: App-Verzeichnis für Deploy-Jobs mounten
#       # - /stacks/mein-repo:/opt/app
#
#       # Optional: SSH-Deploy-Key für private Repos
#       # - /home/pi/.ssh/github_deploy:/home/runner/.ssh/id_ed25519:ro
#
# volumes:
#   mein-repo:                                    # <- Muss für jeden Service ergänzt werden
#
# ──────────────────────────────────────────────────────────────
# Im GitHub Actions Workflow dann:
#
#   jobs:
#     deploy:
#       runs-on: mein-repo
#
# ──────────────────────────────────────────────────────────────
